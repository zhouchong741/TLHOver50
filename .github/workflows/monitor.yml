name: Monitor The Last Hunt Icebreaker + Patagonia

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Restore cached state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/state.json
          key: lasthunt-state-${{ github.run_id }}
          restore-keys: |
            lasthunt-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set deployment timestamp
        run: echo "LASTHUNT_DEPLOYED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Run watcher
        env:
          LASTHUNT_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python run.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: lasthunt-state
          path: |
            data/state.json
            data/notification.json
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Download state artifact
        uses: actions/download-artifact@v4
        with:
          name: lasthunt-state
          path: .

      - name: Normalize downloaded data files
        run: |
          mkdir -p data
          if [ -f state.json ] && [ ! -f data/state.json ]; then mv state.json data/state.json; fi
          if [ -f notification.json ] && [ ! -f data/notification.json ]; then mv notification.json data/notification.json; fi
          ls -la data

      - name: Save cached state
        uses: actions/cache/save@v4
        with:
          path: data/state.json
          key: lasthunt-state-${{ github.run_id }}

      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          summary = json.loads(Path("data/notification.json").read_text(encoding="utf-8"))
          page_url = os.environ.get("PAGE_URL") or summary.get("pages_url") or ""
          webhook_url = os.environ["FEISHU_WEBHOOK_URL"]
          previous_count = summary.get("previous_count")
          current_count = int(summary["current_count"])
          previous_for_display = int(previous_count) if previous_count is not None else 0
          delta = int(summary.get("delta", 0))

          if delta > 0:
              delta_text = f"+{delta}"
          elif delta < 0:
              delta_text = str(delta)
          else:
              delta_text = "0"

          raw_deploy_time = str(summary["deployed_at"])
          normalized = raw_deploy_time.replace("Z", "+00:00")
          parsed = datetime.fromisoformat(normalized)
          deploy_time = parsed.astimezone(timezone(timedelta(hours=8))).strftime("%Y-%m-%d %H:%M:%S UTC+8")
          url_text = page_url or summary.get("pages_url") or ""

          elements = [
              {
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": f"📊 **产品总数**\n{current_count}（变化: {delta_text}）",
                  },
              },
              {
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": f"📈 **历史对比**\n{previous_for_display} -> {current_count}",
                  },
              },
              {
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": f"🕒 **部署时间**\n{deploy_time}",
                  },
              },
          ]

          if url_text:
              elements.append(
                  {
                      "tag": "div",
                      "text": {
                          "tag": "lark_md",
                          "content": f"🔗 **页面网址**\n[{url_text}]({url_text})",
                      },
                  }
              )

          elements.append(
              {
                  "tag": "action",
                  "actions": [
                      {
                          "tag": "button",
                          "text": {
                              "tag": "plain_text",
                              "content": "📱 打开页面",
                          },
                          "type": "primary",
                          "url": url_text or summary.get("category_url") or "",
                      }
                  ],
              }
          )

          payload = json.dumps(
              {
                  "msg_type": "interactive",
                  "card": {
                      "config": {
                          "wide_screen_mode": True,
                          "enable_forward": True,
                      },
                      "header": {
                          "template": "blue",
                          "title": {
                              "tag": "plain_text",
                              "content": "🛍️ The Last Hunt Icebreaker + Patagonia 产品更新",
                          },
                      },
                      "elements": elements,
                  },
              },
              ensure_ascii=False,
          ).encode("utf-8")
          request = urllib.request.Request(
              webhook_url,
              data=payload,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              body = response.read().decode("utf-8", errors="ignore")
              print(body)
          PY
