name: Monitor The Last Hunt Icebreaker + Patagonia

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Restore cached state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/state.json
          key: lasthunt-state-${{ github.run_id }}
          restore-keys: |
            lasthunt-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set deployment timestamp
        run: echo "LASTHUNT_DEPLOYED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Run watcher
        env:
          LASTHUNT_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python run.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: lasthunt-state
          path: |
            data/state.json
            data/notification.json
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Download state artifact
        uses: actions/download-artifact@v4
        with:
          name: lasthunt-state
          path: .

      - name: Normalize downloaded data files
        run: |
          mkdir -p data
          if [ -f state.json ] && [ ! -f data/state.json ]; then mv state.json data/state.json; fi
          if [ -f notification.json ] && [ ! -f data/notification.json ]; then mv notification.json data/notification.json; fi
          ls -la data

      - name: Save cached state
        uses: actions/cache/save@v4
        with:
          path: data/state.json
          key: lasthunt-state-${{ github.run_id }}

      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          summary = json.loads(Path("data/notification.json").read_text(encoding="utf-8"))
          page_url = os.environ.get("PAGE_URL") or summary.get("pages_url") or ""
          webhook_url = os.environ["FEISHU_WEBHOOK_URL"]

          lines = [
              f"{summary['title']} 已部署",
              f"产品总数: {summary['current_count']}",
              f"变化: {summary['change_label']}",
          ]
          if summary.get("previous_count") is not None:
              lines.append(f"对比: {summary['previous_count']} -> {summary['current_count']}")
          if page_url:
              lines.append(f"页面: {page_url}")
          lines.append(f"来源: {summary['category_url']}")
          lines.append(f"部署时间: {summary['deployed_at']}")

          payload = json.dumps(
              {"msg_type": "text", "content": {"text": "\n".join(lines)}},
              ensure_ascii=False,
          ).encode("utf-8")
          request = urllib.request.Request(
              webhook_url,
              data=payload,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              body = response.read().decode("utf-8", errors="ignore")
              print(body)
          PY
