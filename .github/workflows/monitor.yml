name: Monitor The Last Hunt Icebreaker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Restore cached state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/state.json
          key: lasthunt-state-${{ github.run_id }}
          restore-keys: |
            lasthunt-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          LASTHUNT_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python run.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: lasthunt-state
          path: data/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Download state artifact
        uses: actions/download-artifact@v4
        with:
          name: lasthunt-state
          path: .

      - name: Save cached state
        uses: actions/cache/save@v4
        with:
          path: data/state.json
          key: lasthunt-state-${{ github.run_id }}
